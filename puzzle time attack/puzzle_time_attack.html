<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Challenge</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

button {
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4CAF50;
    color:white;
}

#puzzleGrid {
    display:grid;
    gap:2px;
    margin:15px auto;
    width:90vw;
    max-width:500px;
}

.cell {
    aspect-ratio:1/1;
    border-radius:4px;
    background-size:cover;
    background-position:center;
    border:1px solid #333;
}

.correct {
    background-color:green !important;
}

.wrong {
    background-color:red !important;
}

.disabled {
    opacity:0.4;
    pointer-events:none;
}

#choices {
    position: fixed;       /* FIXE */
    bottom: 10px;          /* distance du bas */
    left: 50%;             /* centrer horizontal */
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    background: #222;      /* fond gris sombre */
    padding: 10px;
    border-radius: 8px;
    z-index: 500;
}

.choice {
    width:80px;
    height:80px;
    background-size:cover;
    background-position:center;
    border:3px solid #444;
    cursor:pointer;
    position:relative;
}

/* Confetti */
.confetti {
    position:absolute;
    width:6px;
    height:6px;
    pointer-events:none;
    border-radius:2px;
    animation:confetti-fall 800ms ease-out forwards;
}

@keyframes confetti-fall {
    0% { transform:translate(0,0) scale(1); opacity:1; }
    100% { transform:translate(var(--x), var(--y)) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<div id="menu">
  <h1>Puzzle Challenge</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="game" style="display:none;">
  <div id="timer">Time: 60</div>
  <div id="level">Level: 1</div>
  <div id="puzzleGrid"></div>
  <div id="choices"></div>
</div>

<div id="endScreen" style="display:none;">
  <h2>Time's up!</h2>
  <h3 id="finalScore"></h3>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
let gridSize = 3;
let displayLevel = 1;
let time = 60;
let score = 0;
let timerInterval;
let missingIndex;
let solved = false;

const correctSound = new Audio("win.wav");
const wrongSound = new Audio("fail.wav");
const timesUpSound = new Audio("timesup.wav");

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const puzzleGrid = document.getElementById("puzzleGrid");
const choicesDiv = document.getElementById("choices");
const timerDisplay = document.getElementById("timer");
const levelDisplay = document.getElementById("level");
const endScreen = document.getElementById("endScreen");
const finalScore = document.getElementById("finalScore");

function startGame() {
    menu.style.display = "none";
    game.style.display = "block";
    startTimer();
    nextLevel();
}

function startTimer() {
    timerInterval = setInterval(() => {
        time--;
        timerDisplay.textContent = "Time: " + time;
        if (time <= 0) {
            clearInterval(timerInterval);
            endGame();
        }
    },1000);
}

function endGame() {
    game.style.display = "none";
    endScreen.style.display = "block";
    finalScore.textContent = "Score: " + score;
    timesUpSound.currentTime = 0;
    timesUpSound.play();
}

function nextLevel() {
    puzzleGrid.innerHTML = "";
    choicesDiv.innerHTML = "";
    solved = false;

    let imgURL = "https://picsum.photos/seed/" + Math.floor(Math.random()*10000) + "/600/600";
    levelDisplay.textContent = "Level: " + displayLevel;

    let totalCells = gridSize * gridSize;
    missingIndex = Math.floor(Math.random() * totalCells);

    puzzleGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    for(let i=0;i<totalCells;i++){
        let cell = document.createElement("div");
        cell.classList.add("cell");

        if(i!==missingIndex){
            let row = Math.floor(i/gridSize);
            let col = i%gridSize;
            cell.style.backgroundImage = `url(${imgURL})`;
            cell.style.backgroundSize = `${gridSize*100}% ${gridSize*100}%`;
            cell.style.backgroundPosition = `${-(col*100)}% ${-(row*100)}%`;
        }

        puzzleGrid.appendChild(cell);
    }

    let usedIndices = new Set();
    usedIndices.add(missingIndex);
    let correctChoiceIndex = Math.floor(Math.random()*5);

    for(let i=0;i<5;i++){
        let choice = document.createElement("div");
        choice.classList.add("choice");

        let idx;
        if(i===correctChoiceIndex){
            idx = missingIndex;
        } else {
            do {
                idx = Math.floor(Math.random()*totalCells);
            } while(usedIndices.has(idx));
            usedIndices.add(idx);
        }

        let row = Math.floor(idx/gridSize);
        let col = idx%gridSize;

        choice.style.backgroundImage = `url(${imgURL})`;
        choice.style.backgroundSize = `${gridSize*100}% ${gridSize*100}%`;
        choice.style.backgroundPosition = `${-(col*100)}% ${-(row*100)}%`;

        if(i===correctChoiceIndex){
            choice.onclick = ()=>selectChoice(true, choice);
        } else {
            choice.onclick = ()=>selectChoice(false, choice);
        }

        choicesDiv.appendChild(choice);
    }
}

function selectChoice(isCorrect, choiceDiv){
    if(time<=0 || solved) return;

    if(isCorrect){
        solved = true;

        const targetCell = puzzleGrid.children[missingIndex];
        const startRect = choiceDiv.getBoundingClientRect();
        const endRect = targetCell.getBoundingClientRect();

        // 1️⃣ cloner la pièce originale (clone garde l'image)
        const clone = choiceDiv.cloneNode(true);
        clone.style.position = "fixed";
        clone.style.left = startRect.left + "px";
        clone.style.top = startRect.top + "px";
        clone.style.width = startRect.width + "px";
        clone.style.height = startRect.height + "px";
        clone.style.margin = 0;
        clone.style.zIndex = 1000; // au-dessus de tout
        clone.style.transition = "transform 0.2s ease-in-out";
        clone.style.transformOrigin = "top left";
        document.body.appendChild(clone);

        // 2️⃣ maintenant remplacer la vraie pièce par noir
        choiceDiv.style.backgroundImage = "";
        choiceDiv.style.background = "black";
        choiceDiv.style.pointerEvents = "none";

        // 3️⃣ confettis sur la pièce noire (au-dessus)
        spawnConfettiAt(startRect);

        // 4️⃣ force reflow pour animation
        clone.getBoundingClientRect();

        // 5️⃣ calcul translation + scale
        const deltaX = endRect.left - startRect.left;
        const deltaY = endRect.top - startRect.top;
        const scaleX = endRect.width / startRect.width;
        const scaleY = endRect.height / startRect.height;

        // 6️⃣ glisser et agrandir
        clone.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scaleX}, ${scaleY})`;

        // 7️⃣ après animation
        setTimeout(() => {
            targetCell.style.backgroundImage = clone.style.backgroundImage;
            targetCell.style.backgroundSize = clone.style.backgroundSize;
            targetCell.style.backgroundPosition = clone.style.backgroundPosition;

            clone.remove();

            score++;
            gridSize++;
            displayLevel++;

            setTimeout(nextLevel, 200);

        }, 200);

        correctSound.currentTime = 0;
        correctSound.play();

    } else {
        // mauvais choix
        choiceDiv.classList.add("wrong","disabled");
        choiceDiv.style.backgroundImage = "";
        choiceDiv.style.background = "black";

        wrongSound.currentTime = 0;
        wrongSound.play();
        time -= 3;
        if(time<0) time=0;
        timerDisplay.textContent = "Time: " + time;
    }
}

function spawnConfettiAt(rect){
    for(let i=0;i<25;i++){
        let conf = document.createElement("div");
        conf.classList.add("confetti");

        conf.style.position = "fixed";
        conf.style.left = rect.left + rect.width/2 + "px";
        conf.style.top = rect.top + rect.height/2 + "px";
        conf.style.zIndex = 1100; // au-dessus de tout
        conf.style.width = "6px";
        conf.style.height = "6px";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.borderRadius = "50%";

        let angle = Math.random()*2*Math.PI;
        let distance = 40 + Math.random()*40;

        conf.style.setProperty("--x", Math.cos(angle)*distance + "px");
        conf.style.setProperty("--y", Math.sin(angle)*distance + "px");

        document.body.appendChild(conf);

        setTimeout(()=>conf.remove(),800);
    }
}
</script>

</body>
</html>
